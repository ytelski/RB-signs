<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Link Copier</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #eee; padding: 20px; }
        h1 { text-align: center; color: #555; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover { border-color: #007bff; background: #222; transform: translateY(-3px); }

        .card img {
            width: 100%;
            height: auto; /* Originele verhouding fix */
            border-radius: 4px;
            display: block;
        }

        .card p {
            font-size: 11px;
            margin-top: 10px;
            color: #888;
            word-break: break-all;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #28a745; color: white; padding: 10px 20px;
            border-radius: 20px; display: none; z-index: 100;
        }
    </style>
</head>
<body>

<h1>Assets</h1>
<div class="grid" id="gallery"></div>
<div id="toast">Copied link!</div>

<script>
    const wachtwoord = "FBR2k26";
    let poging = prompt("Enter password");

    if (poging !== wachtwoord) {
        alert("Wrong password.");
        window.location.href = "https://google.com";
    } else {
        // LIJST MET JE PLAATJES
        const assets = [
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowLeft/RB-faster-left-arrow4000x1000.png" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowLeft/RB-faster-left-arrow4000x1000.png" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowLeft/RB-faster-left-arrow4000x1000.png" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowLeft/RB-faster-left-arrow4000x1000.png" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowLeft/RB-faster-left-arrow4000x1000.png" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowRight/RB-faster-right-arrow4000x1000.png" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowRight/RB-faster-right-arrow4000x1000.png" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowRight/RB-faster-right-arrow4000x1000.png" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowRight/RB-faster-right-arrow4000x1000.png" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/StandAlone/1000x1000.png" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/StandAlone/2000x1000.jpg" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/StandAlone/4000x1000.jpg" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/StandAlone/6000x1000.jpg" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/Promo/4000x1000.jpg" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/Promo/6000x1000.jpg" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Waypoint-W_GPS.png" },
            {url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/RBF2_BASEModv7.zip" },
			{url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/faster.png" },
			{url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/ORBR_RBFS1_by_sms.zip" },
			{url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowLeft/RB-faster-left-arrow6000x1000.png" },
			{url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowRight/RB-faster-right-arrow6000x1000.png" },
			{url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowRight/RB-faster-right-arrow2000x1000.png" },
			{url: "https://nadeo-download.cdn.ubi.com/trackmania/assets/RedBull/Pannels/ArrowLeft/RB-faster-left-arrow2000x1000.png" }
        ];

        const gallery = document.getElementById('gallery');
        const toast = document.getElementById('toast');

        assets.forEach(asset => {
            // Check of de URL leeg is
            if(asset.url.trim() === "") return;

            // Pak de bestandsnaam uit de URL voor de tekst onder het plaatje
            const fileName = asset.name || asset.url.split('/').pop();

            const card = document.createElement('div');
            card.className = 'card';

            // Als het een .zip is, laat een icoon zien ipv een kapot plaatje
            const isZip = asset.url.toLowerCase().endsWith('.zip');
            const mediaHtml = isZip
                ? `<div style="padding:20px; font-size:30px;">📦<br><span style="font-size:12px">ZIP Bestand</span></div>`
                : `<img src="${asset.url}" alt="${fileName}">`;

            card.innerHTML = `${mediaHtml}<p>${fileName}</p>`;

            card.onclick = () => {
                navigator.clipboard.writeText(asset.url);
                showToast();
            };
            gallery.appendChild(card);
        });

        function showToast() {
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
    } // <-- Deze accolade ontbrak!
</script>
</body>
</html>
